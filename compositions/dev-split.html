<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <style>
      body, html { margin: 0; padding: 0; width: 1920px; height: 1080px; background: transparent; overflow: hidden; display: flex; color: white; font-family: 'Inter', sans-serif; }
      
      .side { flex: 1; height: 100%; position: relative; overflow: hidden; display: flex; flex-direction: column; align-items: center; justify-content: center; }
      .left { background: #080808; border-right: 2px solid #FF9900; transform: translateX(-100%); }
      .right { background: #0a0e1a; transform: translateX(100%); }
      
      .label { position: absolute; top: 40px; left: 40px; font-weight: 900; text-transform: uppercase; color: #FF9900; font-size: 24px; letter-spacing: 0.1em; }
      
      .code-window { width: 80%; height: 70%; background: #000; border-radius: 10px; padding: 20px; font-family: 'JetBrains Mono', monospace; font-size: 18px; color: #888; overflow: hidden; }
      .code-line { margin-bottom: 5px; opacity: 0; transform: translateX(-10px); }
      .code-keyword { color: #FF9900; }
      .code-string { color: #27c93f; }
      
      .dashboard { width: 80%; height: 70%; display: grid; grid-template-columns: repeat(2, 1fr); gap: 20px; }
      .card { background: rgba(255,255,255,0.05); border: 1px solid rgba(255,153,0,0.2); border-radius: 15px; padding: 20px; display: flex; flex-direction: column; justify-content: center; opacity: 0; transform: scale(0.9); }
      .card-title { font-size: 16px; color: #888; margin-bottom: 10px; }
      .card-value { font-size: 36px; font-weight: 900; color: #fff; }
      .card-chart { width: 100%; height: 40px; background: rgba(255,153,0,0.1); margin-top: 10px; border-radius: 5px; }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
  </head>
  <body>
    <div id="root" class="clip" data-composition-id="dev-split" data-width="1920" data-height="1080" data-start="0" data-duration="6.0" style="width: 100%; height: 100%; display: flex;">
      <div class="side left" id="left">
        <div class="label">AI Agent Coding</div>
        <div class="code-window" id="code">
          <div class="code-line"><span class="code-keyword">validator</span> <span class="code-string">"price_protection"</span> {</div>
          <div class="code-line">&nbsp;&nbsp;<span class="code-keyword">fn</span> <span class="code-keyword">spend</span>(datum: Datum, redeemer: Redeemer, ctx: ScriptContext) {</div>
          <div class="code-line">&nbsp;&nbsp;&nbsp;&nbsp;<span class="code-keyword">let</span> price = charli3.get_price(ctx)</div>
          <div class="code-line">&nbsp;&nbsp;&nbsp;&nbsp;<span class="code-keyword">expect</span> price >= datum.min_price</div>
          <div class="code-line">&nbsp;&nbsp;}</div>
          <div class="code-line">}</div>
        </div>
      </div>
      <div class="side right" id="right">
        <div class="label">Oracle Data Feeds</div>
        <div class="dashboard">
          <div class="card"><div class="card-title">ADA/USD</div><div class="card-value">$0.452</div><div class="card-chart"></div></div>
          <div class="card"><div class="card-title">BTC/USD</div><div class="card-value">$64,231</div><div class="card-chart"></div></div>
          <div class="card"><div class="card-title">ETH/USD</div><div class="card-value">$3,421</div><div class="card-chart"></div></div>
          <div class="card"><div class="card-title">C3/ADA</div><div class="card-value">1.24</div><div class="card-chart"></div></div>
        </div>
      </div>
    </div>
    <script>
      const tl = gsap.timeline({ paused: true });
      window.__timelines = window.__timelines || {};
      window.__timelines["dev-split"] = tl;

      tl.to("#left", { x: 0, duration: 1, ease: "power4.out" }, 0);
      tl.to("#right", { x: 0, duration: 1, ease: "power4.out" }, 0.2);
      
      const lines = document.querySelectorAll('.code-line');
      lines.forEach((line, i) => {
        tl.to(line, { opacity: 1, x: 0, duration: 0.3 }, 1 + (i * 0.2));
      });
      
      const cards = document.querySelectorAll('.card');
      cards.forEach((card, i) => {
        tl.to(card, { opacity: 1, scale: 1, duration: 0.5, ease: "back.out" }, 1.5 + (i * 0.2));
      });
      
      tl.to("#left", { opacity: 0, x: -50, duration: 0.5 }, 5.5);
      tl.to("#right", { opacity: 0, x: 50, duration: 0.5 }, 5.5);
      
      tl.to({}, { duration: 6 }, 0); // Padding
    </script>
  </body>
</html>
