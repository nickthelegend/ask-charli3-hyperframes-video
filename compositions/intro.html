<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <style>
      body, html { margin: 0; padding: 0; width: 1920px; height: 1080px; background: #000; overflow: hidden; color: white; font-family: 'Outfit', sans-serif; }
      
      #intro-canvas { position: relative; width: 1920px; height: 1080px; overflow: hidden; background: #000; }
      
      .hero-container { 
        position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
        text-align: center; width: 100%; max-width: 1400px; z-index: 10; 
      }
      .hero-text { font-size: 110px; font-weight: 900; letter-spacing: -0.04em; line-height: 1.1; opacity: 0; transform: translateY(60px); }
      .highlight { color: #FF9900; text-shadow: 0 0 40px rgba(255, 153, 0, 0.5); }
      
      .glow-orb {
        position: absolute; width: 1000px; height: 1000px;
        background: radial-gradient(circle, rgba(255, 153, 0, 0.15) 0%, transparent 70%);
        border-radius: 50%; top: 50%; left: 50%; transform: translate(-50%, -50%) scale(0.8);
        filter: blur(120px); opacity: 0;
      }
      
      .grid { position: absolute; inset: 0; background-image: linear-gradient(rgba(255,153,0,0.08) 1px, transparent 1px), linear-gradient(90deg, rgba(255,153,0,0.08) 1px, transparent 1px); background-size: 80px 80px; opacity: 0; transform: perspective(1000px) rotateX(60deg) translateY(-200px); }
      
      .scanline {
        position: absolute; width: 100%; height: 2px; background: rgba(255, 153, 0, 0.2);
        top: -10px; left: 0; z-index: 5; opacity: 0;
      }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
  </head>
  <body>
    <div id="intro-canvas" class="clip" data-composition-id="intro" data-width="1920" data-height="1080" data-start="0" data-duration="9.0">
      <div class="grid" id="grid"></div>
      <div class="glow-orb" id="orb"></div>
      <div class="scanline" id="scan"></div>
      <div class="hero-container">
        <div class="hero-text" id="line1">Building on <span class="highlight">Cardano?</span></div>
        <div class="hero-text" id="line2" style="margin-top: 20px;">You need the <span class="highlight">real deal.</span></div>
      </div>
    </div>
    <script>
      const tl = gsap.timeline({ paused: true });
      window.__timelines = window.__timelines || {};
      window.__timelines["intro"] = tl;

      tl.to("#grid", { opacity: 1, duration: 2, transform: "perspective(1000px) rotateX(60deg) translateY(0px)", ease: "power2.out" }, 0);
      tl.to("#orb", { opacity: 1, scale: 1.2, duration: 3, repeat: 2, yoyo: true }, 0);
      
      tl.to("#line1", { opacity: 1, y: 0, duration: 1.5, ease: "power4.out" }, 0.5);
      tl.to("#line2", { opacity: 1, y: 0, duration: 1.5, ease: "power4.out" }, 1.5);
      
      // Cool scanline effect
      tl.to("#scan", { opacity: 1, top: "110%", duration: 2, repeat: 3, ease: "none" }, 1);
      
      tl.to(".hero-text", { opacity: 0, scale: 0.9, duration: 1.2, stagger: 0.2, ease: "power2.in" }, 7);
      tl.to("#grid", { opacity: 0, y: 100, duration: 1.5 }, 7.5);
      
      tl.to({}, { duration: 9 }, 0);
    </script>
  </body>
</html>
